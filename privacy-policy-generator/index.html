<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy policy generator</title>
    <meta
      name="title"
      content="optimized privacy policy generator online - abtahihasan.com"
    />
    <meta
      name="description"
      content="generate adsense ready Optimized  Privacy policy for your website. AbtahiHasan.com"
    />
    <meta
      name="keywords"
      content="privacy policy generator for website, free privacy policy template, free privacy policy generator for blogger, abtahihasan.com, abtahi hasan,"
    />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="language" content="English" />
    <!-- favicon  -->
    <link
      rel="shortcut icon"
      href="./../assets/logo/logo.svg"
      type="image/x-icon"
    />
    <!----===== remixicon CSS ===== -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <!--All css code start here-->
    <link rel="stylesheet" href="./../css/tool-freme-style.css" />
    <link
      rel="stylesheet"
      href="./../css/tools-css/privacy-policy-generator.css"
    />
    <!--All css code end here-->
  </head>
  <body>
    <section class="preloader">
      <div class="loader">
        <div class="upper ball"></div>
        <div class="right ball"></div>
        <div class="lower ball"></div>
        <div class="left ball"></div>
      </div>
    </section>
    <nav class="sidebar close">
      <div class="logo">
        <img
          src="./../assets/logo/logo.svg"
          alt="Abtahi Hasan Logo"
          class="logo-icon"
        />
        <h1 class="logo-text">abtahiHasan</h1>
      </div>
      <section class="search">
        <div class="search-box">
          <input type="text" placeholder="Search here ..." /><i
            class="ri-search-line"
          ></i>
        </div>
      </section>
      <ul class="navlinks">
        <li class="show-search-pop-up"><i class="ri-search-line"></i></li>
      </ul>
    </nav>
    <!-- main  -->
    <main class="main full">
      <div class="top-bar">
        <div class="manu-icon">
          <img src="./../assets/nav-icon/menu-2-line.svg" alt="menu icon" />
        </div>
      </div>

      <section class="main-content">
        <!-- search  -->
        <section class="search-pop-up">
          <div class="pop-up-search-box">
            <input
              type="text"
              id="search-input"
              placeholder="Search here ..."
            /><i class="ri-search-line"></i>
          </div>
          <i class="ri-close-line"></i>
        </section>
        <section class="toolbody">
          <h1>Privacy Policy Generator</h1>
          <form id="form">
            <div class="form-control">
              <label for="website-name">Website <span>*</span></label>
              <input
                type="text"
                id="website-name"
                placeholder="Your Website name"
                autocomplete="off"
              />
              <i class="ri-checkbox-circle-fill"></i>
              <i class="ri-close-circle-fill"></i>
              <small class="err-message">Err</small>
            </div>
            <div class="form-control">
              <label for="email">Email <span>*</span></label>
              <input
                type="text"
                id="email"
                placeholder="Your email address"
                autocomplete="off"
              />
              <i class="ri-checkbox-circle-fill"></i>
              <i class="ri-close-circle-fill"></i>
              <small class="err-message">Err</small>
            </div>
            <div class="form-control">
              <label for="website-url">Website Url <span>*</span></label>
              <input
                type="text"
                id="website-url"
                placeholder="Your Website url"
                autocomplete="off"
              />
              <i class="ri-checkbox-circle-fill"></i>
              <i class="ri-close-circle-fill"></i>
              <small class="err-message">Err</small>
            </div>
            <button type="submit" class="generate" id="generate">
              Generate
            </button>
            <div class="result_section">
              <p id="copy-data">
                <img
                  src="./../assets/icon/copy-solid.svg"
                  alt="copy Btn icon"
                />
              </p>
              <textarea id="result" readonly> </textarea>
            </div>
          </form>
        </section>
      </section>
    </main>
    <!-- js  -->
    <script src="./../js/tools-js/privacy-policy-generator.js"></script>
    <script src="./../js/tool-api.js"></script>
  </body>
</html>
